name: build aj_sr04m

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.0

  build-and-scan:
    runs-on: ubuntu-latest
    needs: pre-commit
    container:
      image: espressif/idf:v6.0.1
    env:
      EXAMPLE_PATH: componant/aj_sr04m/exemples/get_started
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory
      IDF_TARGET: esp32s3
      BUILD_WRAPPER_DOWNLOAD_URL: https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
      SONAR_SCANNER_DOWNLOAD_URL: https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.2.0.5079-linux-x64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install Sonar tooling
        run: |
          set -e
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends curl unzip
          mkdir -p /opt/sonar
          curl -fsSLo /opt/sonar/build-wrapper.zip "${BUILD_WRAPPER_DOWNLOAD_URL}"
          unzip -q /opt/sonar/build-wrapper.zip -d /opt/sonar
          chmod +x /opt/sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64
          curl -fsSLo /opt/sonar/sonar-scanner.zip "${SONAR_SCANNER_DOWNLOAD_URL}"
          unzip -q /opt/sonar/sonar-scanner.zip -d /opt/sonar

      - name: Build with build-wrapper
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          cd "${EXAMPLE_PATH}"
          idf.py set-target "${IDF_TARGET}"
          /opt/sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
            --out-dir "${BUILD_WRAPPER_OUT_DIR}" \
            idf.py build size

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          set -e
          /opt/sonar/sonar-scanner-7.2.0.5079-linux-x64/bin/sonar-scanner \
            --define "sonar.cfamily.compile-commands=${EXAMPLE_PATH}/${BUILD_WRAPPER_OUT_DIR}/compile_commands.json"

  upload_components:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Upload component to the component registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: "aj_sr04m"
          version: ${{ github.ref_name }}
          namespace: "CyrilB1531"
          api_token: ${{ secrets.TOKEN_GIT_TO_REGISTRY}}
          directories: components
