name: build aj_sr04m

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.0

  build-component:
    name: Build src/ via example (IDF ${{ matrix.idf_version }}, ${{ matrix.idf_target }})
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        idf_version: ["v5.4.3", "v6.0.1"]
        idf_target: ["esp32", "esp32s3"]
    container:
      image: espressif/idf:${{ matrix.idf_version }}
    env:
      EXAMPLE_PATH: examples/aj_sr04m_example
    steps:
      - uses: actions/checkout@v4
      - name: Build example
        # Exercises src/ as a transitive dependency of the example. This
        # validates that the component compiles cleanly against each
        # supported IDF release on every chip target in idf_component.yml.
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          cd "${EXAMPLE_PATH}"
          idf.py set-target "${{ matrix.idf_target }}"
          idf.py build size

  test:
    name: QEMU tests (IDF ${{ matrix.idf_version }}, mode ${{ matrix.mode }}, ${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        idf_version: ["v5.4.3", "v6.0.1"]
        mode: ["1", "2", "3", "4", "5"]
        variant: ["aj_sr04m"]
        # The variant flag only affects modes 4 and 5 (UART trigger byte
        # — 0x01 for AJ-SR04M vs 0x55 for JSN-SR04T). Add JSN-SR04T runs
        # for those two modes; the other modes get nothing new from
        # running the same code twice.
        include:
          - idf_version: "v5.4.3"
            mode: "4"
            variant: "jsn_sr04t"
          - idf_version: "v5.4.3"
            mode: "5"
            variant: "jsn_sr04t"
          - idf_version: "v6.0.1"
            mode: "4"
            variant: "jsn_sr04t"
          - idf_version: "v6.0.1"
            mode: "5"
            variant: "jsn_sr04t"
    container:
      image: espressif/idf:${{ matrix.idf_version }}
    env:
      TEST_PATH: tests/qemu
      QEMU_TARGET: esp32
      SDKCONFIG_DEFAULTS: "sdkconfig.defaults;sdkconfig.defaults.mode${{ matrix.mode }}${{ matrix.variant == 'jsn_sr04t' && ';sdkconfig.defaults.jsn_sr04t' || '' }}"

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU for Xtensa
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          "${IDF_PATH}/tools/idf_tools.py" install qemu-xtensa

      - name: Build test app
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          cd "${TEST_PATH}"
          # Coverage is collected by the separate linux-test job (gcov on
          # the POSIX simulator); the QEMU build only validates Unity
          # results on the ESP32 target. SDKCONFIG_DEFAULTS (set per-job)
          # selects which sensor mode this run exercises.
          idf.py set-target "${QEMU_TARGET}"
          idf.py build

      - name: Run tests under QEMU
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          cd "${TEST_PATH}"

          # Generate qemu_flash.bin manually (replicates what idf.py qemu
          # does internally, without spawning qemu-system-xtensa or
          # idf_monitor). This avoids the TTY / TCP / buffering issues of
          # idf.py qemu monitor in a CI environment.
          # The app .bin name follows the project() name in CMakeLists.txt,
          # so detect it instead of hard-coding.
          APP_BIN=$(ls -1 build/*.bin 2>/dev/null \
                    | xargs -n1 basename \
                    | grep -vE '^(qemu_flash|qemu_efuse)\.bin$' \
                    | head -1)
          echo "Detected app binary: ${APP_BIN}"
          ( cd build && esptool.py --chip=esp32 merge_bin \
              --output=qemu_flash.bin \
              --fill-flash-size=2MB \
              --flash_mode dio --flash_freq 40m --flash_size 2MB \
              0x1000 bootloader/bootloader.bin \
              0x10000 "${APP_BIN}" \
              0x8000 partition_table/partition-table.bin )

          # Blank 1 KiB efuse image expected by qemu's nvram driver.
          dd if=/dev/zero of=build/qemu_efuse.bin bs=1024 count=1 2>/dev/null

          # Run qemu directly with serial redirected to a file. QEMU's
          # `-serial file:` backend writes raw serial bytes to the file
          # without buffering surprises.
          timeout 90s qemu-system-xtensa \
              -M esp32 -m 4M \
              -drive file=build/qemu_flash.bin,if=mtd,format=raw \
              -drive file=build/qemu_efuse.bin,if=none,format=raw,id=efuse \
              -global driver=nvram.esp32.efuse,property=drive,value=efuse \
              -global driver=timer.esp32.timg,property=wdt_disable,value=true \
              -nic user,model=open_eth \
              -nographic \
              -serial file:output.log 2>qemu-stderr.log || true

          echo "----- output.log tail (50 lines) -----"
          tail -50 output.log 2>/dev/null || true
          echo "----- qemu-stderr.log -----"
          cat qemu-stderr.log 2>/dev/null || true
          echo "----- end -----"

          # Verify Unity passed and reached the end-of-test sentinel.
          echo "----- Unity summary -----"
          grep -E "Tests +[0-9]+ Failures +[0-9]+ Ignored" output.log || true
          grep -qE "Failures +0 " output.log
          grep -q "=== TESTS_DONE ===" output.log

  linux-test:
    name: Linux test + coverage + SonarQube scan
    runs-on: ubuntu-latest
    needs: pre-commit
    container:
      image: espressif/idf:v5.4.3
    env:
      TEST_PATH: tests/linux
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # Sonar needs full history for blame/relevancy.

      - name: Install host deps
        # libbsd-dev: ESP-IDF's linux target ports include <bsd/sys/cdefs.h>
        # via components/linux/include/sys/cdefs.h.
        # lcov: the human-readable coverage summary.
        shell: bash
        run: |
          set -e
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends libbsd-dev lcov

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0

      - name: Build, run, and collect coverage for every mode/variant
        # Loop over each (mode, variant) combination that needs running.
        # Modes 1/2/3 are variant-agnostic (no trigger byte to switch),
        # so they run only with the default AJ-SR04M variant; modes 4
        # and 5 also run with the JSN-SR04T variant to cover the 0x55
        # trigger-byte path.
        #
        # Mode 4 / AJ-SR04M is wrapped by build-wrapper so SonarCloud's
        # CFamily analyzer has a compile_commands.json that exercises
        # the UART path used by most consumers.
        shell: bash
        run: |
          set -e
          . "${IDF_PATH}/export.sh"
          cd "${TEST_PATH}"
          for spec in \
              "1:aj_sr04m" "2:aj_sr04m" "3:aj_sr04m" \
              "4:aj_sr04m" "4:jsn_sr04t" \
              "5:aj_sr04m" "5:jsn_sr04t"; do
            MODE="${spec%:*}"
            VARIANT="${spec#*:}"
            TAG="mode${MODE}_${VARIANT}"
            echo "===== ${TAG} ====="
            rm -rf build sdkconfig
            DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.mode${MODE}"
            if [ "${VARIANT}" = "jsn_sr04t" ]; then
              DEFAULTS="${DEFAULTS};sdkconfig.defaults.jsn_sr04t"
            fi
            SDKCONFIG_DEFAULTS="${DEFAULTS}" \
              idf.py --preview set-target linux >/dev/null
            if [ "${TAG}" = "mode4_aj_sr04m" ]; then
              build-wrapper-linux-x86-64 \
                --out-dir "${BUILD_WRAPPER_OUT_DIR}" \
                idf.py build
            else
              idf.py build
            fi
            ./build/aj_sr04m_test_linux.elf | tee "output.${TAG}.log"
            grep -qE "Failures +0 " "output.${TAG}.log"
            grep -q "=== TESTS_DONE ===" "output.${TAG}.log"

            mkdir -p "gcov-reports/${TAG}"
            ( cd "gcov-reports/${TAG}" \
              && find ../../build -name "*.gcno" -print0 \
                 | xargs -0 -I{} gcov -p -b -c "{}" >/dev/null || true )

            # lcov 2.x rejects Unity's TEST_CASE expansion as a
            # "mismatched end line" because the macro spans multiple
            # GCC line tags pointing at the same source line. The
            # ignore-errors flag downgrades it to a warning; tests
            # files themselves are excluded from the report anyway.
            lcov --capture --directory build \
                 --output-file "coverage.${TAG}.info" \
                 --base-directory "$(pwd)/../.." \
                 --rc lcov_branch_coverage=1 \
                 --ignore-errors mismatch,gcov,source
            lcov --extract "coverage.${TAG}.info" "*/aj_sr04m/src/*" \
                 --output-file "coverage.${TAG}.info" \
                 --ignore-errors empty,unused
          done

          # Combined lcov.info across every run — handy as a single
          # downloadable artifact for humans (matches what Codecov-style
          # tools expect). Sonar still reads per-run gcov dirs below.
          lcov $(for f in coverage.*.info; do printf -- "-a %s " "$f"; done) \
               --output-file coverage.info \
               --ignore-errors empty,inconsistent
          lcov --list coverage.info

      - name: Filter compile_commands.json to C-only
        # SonarCloud CFamily 6.x chokes on -std=gnu++26 used by some IDF
        # components (mbedtls etc.). aj_sr04m is pure C, so dropping the
        # C++ entries loses nothing.
        shell: bash
        run: |
          set -e
          JSON="${TEST_PATH}/${BUILD_WRAPPER_OUT_DIR}/compile_commands.json"
          python3 - "$JSON" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path) as f:
              data = json.load(f)
          c_only = [e for e in data if e.get('file', '').endswith('.c')]
          with open(path, 'w') as f:
              json.dump(c_only, f)
          print(f"Filtered compile_commands.json: kept {len(c_only)}/{len(data)} C entries")
          PY

      - name: Build gcov reportsPath list
        # Comma-separated list of every per-run gcov dir under
        # tests/linux/gcov-reports/, fed to sonar.cfamily.gcov.reportsPath.
        shell: bash
        id: gcov_paths
        run: |
          set -e
          paths=$(find "${TEST_PATH}/gcov-reports" -mindepth 1 -maxdepth 1 -type d \
                  | sort | paste -sd, -)
          echo "paths=${paths}" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=${{ env.TEST_PATH }}/${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.cfamily.gcov.reportsPath=${{ steps.gcov_paths.outputs.paths }}
            --define sonar.cpp.file.suffixes=-
            --define sonar.objc.file.suffixes=-

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-coverage
          path: |
            ${{ env.TEST_PATH }}/coverage.info
            ${{ env.TEST_PATH }}/coverage.*.info
            ${{ env.TEST_PATH }}/gcov-reports/

  upload_components:
    runs-on: ubuntu-latest
    needs: [build-component, test, linux-test]
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Upload component to the component registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: "aj_sr04m: ."
          version: ${{ github.ref_name }}
          namespace: "CyrilB1531"
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN}}
