name: build aj_sr04m

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.0

  build:
    runs-on: ubuntu-latest
    needs: pre-commit
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory
      BUILD_WRAPPER_DOWNLOAD_URL: https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
    strategy:
      matrix:
        target: [esp32s3]
        esp_idf_version: [v6.0.1]
        path: [componant/aj_sr04m/exemples/get_started]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download SonarCloud build-wrapper
        run: |
          mkdir -p .sonar
          curl -sSLo .sonar/build-wrapper-linux-x86.zip "${BUILD_WRAPPER_DOWNLOAD_URL}"
          unzip -q -o .sonar/build-wrapper-linux-x86.zip -d .sonar/
          chmod +x .sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64
      - name: esp-idf build (wrapped)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.esp_idf_version }}
          target: ${{ matrix.target }}
          path: ${{ matrix.path }}
          command: "/app/${{ github.repository }}/.sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} idf.py build size"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.target }}
          path: |
            ${{ matrix.path }}/build
            ${{ matrix.path }}/${{ env.BUILD_WRAPPER_OUT_DIR }}
          if-no-files-found: error
          include-hidden-files: true

  sonarqube:
    needs: build
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      EXAMPLE_PATH: componant/aj_sr04m/exemples/get_started
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory
      DOCKER_PREFIX: /app/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-esp32s3
      - name: Rewrite Docker paths in build artifacts
        run: |
          # esp-idf-ci-action builds in a Docker container with workspace at $DOCKER_PREFIX.
          # On the SonarQube runner the same files are at $GITHUB_WORKSPACE -- rewrite paths
          # so that Sonar's CFamily plugin can resolve sources, headers and the build-wrapper
          # output (build-wrapper-dump.json contains absolute paths recorded inside Docker).
          find "${EXAMPLE_PATH}/build" "${EXAMPLE_PATH}/${BUILD_WRAPPER_OUT_DIR}" -type f \( \
              -name "*.json" \
              -o -name "*flags" \
              -o -path "*/CMakeFiles/*" \
            \) -exec sed -i "s|${DOCKER_PREFIX}|${GITHUB_WORKSPACE}|g" {} +
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.build-wrapper-output=${{ env.EXAMPLE_PATH }}/${{ env.BUILD_WRAPPER_OUT_DIR }}

  upload_components:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Upload component to the component registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: "aj_sr04m"
          version: ${{ github.ref_name }}
          namespace: "CyrilB1531"
          api_token: ${{ secrets.TOKEN_GIT_TO_REGISTRY}}
          directories: components
